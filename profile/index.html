<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Paint Aesthetic - Profile</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'MS Sans Serif', Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container Utama */
        .workspace {
            position: relative;
            width: 800px;
            height: 700px;
        }

        /* Jendela Utama MS Paint */
        .paint-window {
            position: absolute;
            left: 50px;
            top: 100px;
            width: 650px;
            height: 550px;
            background-color: #dcd0ff;
            border: 3px solid #fff;
            border-right-color: #8a7bbf;
            border-bottom-color: #8a7bbf;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Title Bar */
        .title-bar {
            background: linear-gradient(90deg, #b59eff, #e2d7ff);
            color: #5d48b3;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title-left {
            display: flex;
            align-items: center;
        }

        .title-icon {
            margin-right: 6px;
        }

        .close-btn-window {
            background: #e6ddff;
            border: 1px solid #fff;
            border-right-color: #8a7bbf;
            border-bottom-color: #8a7bbf;
            color: #5d48b3;
            padding: 0 5px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Menu Bar */
        .menu-bar {
            display: flex;
            padding: 2px 6px;
            font-size: 12px;
            color: #5d48b3;
            border-bottom: 2px solid #bdaeff;
        }

        .menu-item {
            margin-right: 12px;
            cursor: pointer;
        }
        .menu-item span {
            text-decoration: underline;
        }

        /* Main Content (Toolbar + Canvas) */
        .main-content {
            display: flex;
            flex: 1;
            background-color: #dcd0ff;
            padding: 4px;
            position: relative;
        }

        /* Toolbar Kiri */
        .toolbar {
            width: 60px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 2px;
            align-content: start;
            background-color: #dcd0ff;
            padding-right: 4px;
        }

        .tool-btn {
            width: 25px;
            height: 25px;
            background-color: #e6ddff;
            border: 2px solid #fff;
            border-right-color: #8a7bbf;
            border-bottom-color: #8a7bbf;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #6a56c2;
            cursor: pointer;
        }

        .tool-btn.active {
            background-color: #c4b5f7;
            border: 2px solid #8a7bbf;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        /* Canvas Tengah (Area Hitam) */
        .canvas-area {
            flex: 1;
            background-color: #000000;
            border: 3px solid #8a7bbf;
            border-right-color: #fff;
            border-bottom-color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi Bintang Neon di Canvas */
        .stars-decor {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ff00ff;
            font-size: 24px;
            line-height: 0.8;
            filter: drop-shadow(0 0 5px #ff00ff);
            user-select: none;
            z-index: 10;
        }

        /* Target Aset Gambar: dipindah ke ../assets/1000614249.png karena berada di subfolder profile */
        .wave-background {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75%;
            background-image: url('../assets/1000614249.png');
            background-size: cover;
            background-position: bottom center;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 1;
        }

        /* Bottom Section (Color Box + Status Bar) */
        .bottom-section {
            background-color: #dcd0ff;
            padding: 4px;
            border-top: 2px solid #bdaeff;
        }

        /* Palet Warna */
        .color-box {
            display: flex;
            background-color: #e6ddff;
            border: 2px solid #8a7bbf;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .current-colors {
            width: 32px;
            height: 32px;
            border: 2px solid #fff;
            border-right-color: #8a7bbf;
            border-bottom-color: #8a7bbf;
            position: relative;
            margin-right: 6px;
            background-color: #fff;
        }

        .color-foreground {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #d500f9;
            border: 1px solid #000;
            z-index: 2;
        }

        .color-background {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 16px;
            height: 16px;
            background-color: #fff;
            border: 1px solid #000;
            z-index: 1;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(14, 15px);
            grid-gap: 2px;
        }

        .color-tile {
            width: 15px;
            height: 15px;
            border: 1px solid #8a7bbf;
        }

        /* Status Bar */
        .status-bar {
            background-color: #dcd0ff;
            border: 2px solid #8a7bbf;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 2px 6px;
            font-size: 11px;
            color: #5d48b3;
        }

        /* Pop-up Kanan Atas: "two time" */
        .two-time-popup {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 250px;
            background-color: #d2c4ff;
            border: 2px solid #fff;
            border-right-color: #7966c4;
            border-bottom-color: #7966c4;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .popup-title {
            background-color: #a38eff;
            color: #fff;
            padding: 3px 8px;
            font-size: 13px;
            font-weight: bold;
        }

        .popup-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-size: 12px;
            color: #5d48b3;
        }

        .bubble-chat {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .speech-icon {
            width: 24px;
            height: 24px;
            background-color: #fff;
            border-radius: 50%;
            position: relative;
        }
        .speech-icon::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: #fff;
            transform: rotate(45deg);
        }

        .popup-btn {
            background-color: #e6ddff;
            border: 2px solid #fff;
            border-right-color: #7966c4;
            border-bottom-color: #7966c4;
            padding: 2px 16px;
            color: #5d48b3;
            cursor: pointer;
            font-size: 11px;
        }

        /* Pop-up Cascading Error Kanan Bawah */
        .error-cascade {
            position: absolute;
            bottom: 60px;
            right: 40px;
            width: 180px;
            background-color: #e6ddff;
            border: 2px solid #fff;
            border-right-color: #7966c4;
            border-bottom-color: #7966c4;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }

        .error-title {
            background-color: #7c5eff;
            color: white;
            padding: 2px 6px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-x {
            border: 1px solid #fff;
            padding: 0 3px;
            font-size: 9px;
            background: #e6ddff;
            color: #000;
            cursor: pointer;
        }

        .error-body {
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #333;
        }

        .error-icon {
            font-size: 16px;
        }

        /* Membuat efek bertumpuk (Cascade) */
        .err-1 { transform: translate(-45px, -45px); z-index: 4; }
        .err-2 { transform: translate(-30px, -30px); z-index: 5; }
        .err-3 { transform: translate(-15px, -15px); z-index: 6; }
        .err-4 { transform: translate(0, 0); z-index: 7; box-shadow: 4px 4px 12px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

                    <div class="color-tile" style="background-color: #fff9c4;"></div>

</html>
